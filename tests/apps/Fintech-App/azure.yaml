# azure.yaml — Azure Developer CLI (azd) manifest
# FinTech GOAT (Goat of All Threats) — Deliberately Vulnerable AI Application
# FOR SECURITY RESEARCH AND RED-TEAM TESTING ONLY. DO NOT DEPLOY TO PRODUCTION.

name: fintech-goat

metadata:
  template: fintech-goat@0.0.1
  description: >
    Deliberately vulnerable FinTech AI application for NuGuard red-team testing.
    Contains intentional OWASP LLM Top-10 and OWASP API Top-10 vulnerabilities.
    Architecture: 6 AI sub-agents, 21 MCP microservices, 27+ intentional vulns.

infra:
  provider: bicep
  path: infra
  module: main

pipeline:
  provider: github

services:
  # ── Core banking MCP server (legacy — transfer_funds, fetch_market_report) ──
  mcp-banking-server:
    project: src/mcp_server
    language: py
    host: containerapp
    docker:
      path: Dockerfile
      context: .

  # ── Account management (VULN-MCP-03: list_all_accounts, no auth) ──────────
  mcp-accounts:
    project: src/mcp-accounts
    language: py
    host: containerapp
