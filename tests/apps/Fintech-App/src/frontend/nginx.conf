events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Logging
    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent"';
    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    sendfile on;
    keepalive_timeout 65;

    # Upstream — resolved from ORCHESTRATOR_UPSTREAM env var (envsubst at startup)
    # Local docker-compose: orchestrator:8001
    # Azure Container Apps:  agent-orchestrator (ACA internal DNS, port 80)
    upstream orchestrator_backend {
        server ${ORCHESTRATOR_UPSTREAM};
    }

    server {
        listen 80;
        server_name _;

        # Serve static frontend assets
        location / {
            root  /usr/share/nginx/html;
            index index.html;
            try_files $uri $uri/ /index.html;
        }

        # Proxy REST API requests to orchestrator
        location /api/ {
            proxy_pass         http://orchestrator_backend;
            proxy_http_version 1.1;
            proxy_set_header   Connection        "";
            proxy_set_header   Host              ${ORCHESTRATOR_UPSTREAM};
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;
        }

        # Proxy WebSocket upgrade requests to orchestrator
        location /ws/ {
            proxy_pass         http://orchestrator_backend;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host       $host;
            proxy_read_timeout 86400s;    # Long-lived connection
        }

        # Health probe
        location /nginx-health {
            return 200 "OK\n";
            add_header Content-Type text/plain;
        }
    }
}
