  mcp-scheduler:
    build: { context: ./src/mcp-scheduler, dockerfile: Dockerfile }
    ports: ["8102:8080"]
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5
