# FinTech GOAT — Local Development
# =====================================
# Complex multi-agent AI banking platform with 20+ MCP microservices,
# 6 AI sub-agents, and 27+ intentional vulnerabilities for red-team testing.
#
# Usage:
#   docker compose up --build          # Build and start ALL 23 services
#   docker compose up orchestrator mcp-banking-server redis  # Core only
#   docker compose down -v             # Stop and remove volumes
#
# Requires: .env file (copy from .env.example)

version: "3.9"

services:
  # ── Redis message broker (for Celery task queue) ──────────────────────────
  redis:
    image: redis:7.4-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── MCP Banking Server (core, legacy) ─────────────────────────────────────
  mcp-banking-server:
    build:
      context: ./src/mcp_server
      dockerfile: Dockerfile
    ports:
      - "8082:8080"
    environment:
      - REDIS_URL=redis://redis:6379/0
      - APPLICATIONINSIGHTS_CONNECTION_STRING=${APPLICATIONINSIGHTS_CONNECTION_STRING:-}
      - DATABASE_URL=sqlite:///./cipher_bank.db
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - mcp_data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ── MCP Microservices (20 domain-specific servers) ─────────────────────────

  mcp-accounts:
    build: { context: ./src/mcp-accounts, dockerfile: Dockerfile }
    ports: ["8083:8080"]
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  mcp-payments:
    build: { context: ./src/mcp-payments, dockerfile: Dockerfile }
    ports: ["8084:8080"]
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  mcp-cards:
    build: { context: ./src/mcp-cards, dockerfile: Dockerfile }
    ports: ["8085:8080"]
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/health"]
