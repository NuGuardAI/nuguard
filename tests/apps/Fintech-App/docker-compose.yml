  # ── Agent Orchestrator (6 AI sub-agents) ──────────────────────────────────
  orchestrator:
    build:
      context: ./src/orchestrator
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    environment:
      # Core
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - AZURE_OPENAI_API_KEY=${AZURE_OPENAI_API_KEY:-}
      - AZURE_OPENAI_ENDPOINT=${AZURE_OPENAI_ENDPOINT:-}
      - AZURE_OPENAI_DEPLOYMENT=${AZURE_OPENAI_DEPLOYMENT:-gpt-4o}
      - AZURE_OPENAI_API_VERSION=${AZURE_OPENAI_API_VERSION:-2024-11-20}
      - APPLICATIONINSIGHTS_CONNECTION_STRING=${APPLICATIONINSIGHTS_CONNECTION_STRING:-}
      # MCP service URLs
      - MCP_SERVER_URL=http://mcp-banking-server:8080
      - MCP_ACCOUNTS_URL=http://mcp-accounts:8080
      - MCP_PAYMENTS_URL=http://mcp-payments:8080
      - MCP_CARDS_URL=http://mcp-cards:8080
      - MCP_LOANS_URL=http://mcp-loans:8080
      - MCP_INVESTMENTS_URL=http://mcp-investments:8080
      - MCP_MARKET_DATA_URL=http://mcp-market-data:8080
      - MCP_FX_URL=http://mcp-fx:8080
      - MCP_CRYPTO_URL=http://mcp-crypto:8080
      - MCP_FRAUD_URL=http://mcp-fraud:8080
      - MCP_KYC_URL=http://mcp-kyc:8080
      - MCP_AML_URL=http://mcp-aml:8080
      - MCP_COMPLIANCE_URL=http://mcp-compliance:8080
      - MCP_NOTIFICATIONS_URL=http://mcp-notifications:8080
      - MCP_AUDIT_URL=http://mcp-audit:8080
      - MCP_REPORTING_URL=http://mcp-reporting:8080
      - MCP_DOCUMENTS_URL=http://mcp-documents:8080
      - MCP_ADMIN_URL=http://mcp-admin:8080
      - MCP_DATA_EXPORT_URL=http://mcp-data-export:8080
      - MCP_INTERNAL_BRIDGE_URL=http://mcp-internal-bridge:8080
      - MCP_SCHEDULER_URL=http://mcp-scheduler:8080
    depends_on:
      mcp-banking-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8001/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ── Frontend UI ───────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./src/frontend
      dockerfile: Dockerfile
    ports:
      - "8080:80"
    environment:
      - ORCHESTRATOR_URL=http://orchestrator:8001
      - ORCHESTRATOR_UPSTREAM=orchestrator:8001
    depends_on:
      - orchestrator

volumes:
  mcp_data:
