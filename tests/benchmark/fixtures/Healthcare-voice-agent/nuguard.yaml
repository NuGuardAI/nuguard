# nuguard.yaml — Healthcare Voice Agent fixture
# Per-fixture config loaded automatically by the E2E redteam test harness.
# Place secrets in environment variables and reference them with ${VAR}.

# ─── Red-team settings ────────────────────────────────────────────────────────
redteam:
  # Full profile exercises all scenarios regardless of impact score.
  # Use 'ci' for fast runs (impact >= 5 only).
  profile: full

  # Verbose report: include full per-scenario input/output traces.
  verbose: true

  # The /run_langgraph endpoint runs a 5-agent LangGraph pipeline (normalize →
  # prognosis_search via DuckDuckGo → specialist_lookup → recommend →
  # fetch_doctor_details), each making GPT-4 calls. The default 30 s timeout
  # fires before the chain completes; 180 s gives enough headroom.
  request_timeout: 240

  # Environment variables injected into the healthcare app subprocess.
  # The app uses psycopg2 with individual DB_* vars (not DATABASE_URL).
  # Credentials match the docker-compose.yml defaults for the bundled Postgres image.
  #
  # DB-backed endpoints that require a running Postgres instance:
  #   POST /login
  #   GET  /patient-details/{user_id}
  #   GET  /medical-history/{user_id}
  #   POST /appointments
  #
  # To start the database locally:
  #   docker-compose up -d db
  #   (from the Healthcare-voice-agent repo root)
  app_env:
    DB_HOST: localhost
    DB_PORT: "5432"
    DB_NAME: healthcare
    DB_USER: fastapi_user
    DB_PASSWORD: yourpassword

    # Optional: suppress verbose LangGraph/LangChain startup logs from the app
    LOG_LEVEL: warning
